---
# Development Environment Configuration
environment: dev
deploy_root: "C:/Program Files/Inductive Automation/Ignition/data/projects"
tags_root: "C:/Program Files/Inductive Automation/Ignition/data/config/resources/core/ignition/tag-definition/default"
gateway:
  url: http://localhost:8088
  username: admin
  container_name: ignition-dev
  backup_path: ./backups/dev
database:
  host: localhost
  port: 5432
  name: ignition_dev
  username: ignition
projects:
  # List of projects to deploy (will be populated by CI/CD)
  # Format: project-name: path/to/project.zip
deployment:
  auto_backup: true
  backup_retention_days: 7
  pre_deploy_scripts:
    - db_migrate
  post_deploy_scripts:
    - smoke_test
