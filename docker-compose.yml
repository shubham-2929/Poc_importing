    container_name: ignition-staging
    restart: unless-stopped
    ports:
      - "8188:8088"  # HTTP port
      - "8143:8043"  # HTTPS port
      - "8160:8060"  # Gateway Network port
    volumes:
      # Curated configuration mounts (additive approach)
      - ./services/ignition-staging/config:/usr/local/bin/ignition/data/config
      - ./services/ignition-staging/projects:/usr/local/bin/ignition/data/projects
      # Persist internal database state to avoid repeated commissioning
