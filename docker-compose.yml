# Docker Compose - Ignition Development Only
version: '3.8'

services:
  ignition-dev:
    image: inductiveautomation/ignition:8.3.2
    container_name: ignition-dev
    restart: unless-stopped
    ports:
      - "8088:8088"  # HTTP
      - "8043:8043"  # HTTPS
      - "8060:8060"  # Gateway Network
    volumes:
      - ./services/ignition-dev/config:/usr/local/bin/ignition/data/config
      - ./services/ignition-dev/projects:/usr/local/bin/ignition/data/projects
      - ./config/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./backups/dev:/backups
      - ./secrets/gateway_admin_password.txt:/run/secrets/gateway_admin_password:ro
      # Third-party modules
      - ./third-party-modules/ApexCharts-2.0.1.modl:/usr/local/bin/ignition/user-lib/modules/ApexCharts-2.0.1.modl:ro
      - ./third-party-modules/MQTT-Distributor-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Distributor-signed.modl:ro
      - ./third-party-modules/MQTT-Engine-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Engine-signed.modl:ro
      - ./third-party-modules/MQTT-Transmission-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Transmission-signed.modl:ro
      # Python and JAR libraries
      - ./pylib/Mustry:/usr/local/bin/ignition/user-lib/pylib/Mustry:ro
      - ./jar-files/amqp-client-5.28.0.jar:/usr/local/bin/ignition/lib/core/common/amqp-client-5.28.0.jar:ro
    environment:
      - ACCEPT_IGNITION_EULA=Y
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD_FILE=/run/secrets/gateway_admin_password
      - IGNITION_EDITION=standard
      - GATEWAY_MODULES_ENABLED=alarm-notification,reporting,opc-ua,perspective,sms-notification,symbol-factory,tag-historian,udp-tcp-drivers,web-developer,com.kyvislabs.apexcharts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - IGNITION_UID=1000
      - IGNITION_GID=1000
      - TZ=Europe/Brussels
      - GATEWAY_NETWORK_ENABLED=true
      - GATEWAY_RESTORE_DISABLED=true
      - ACCEPT_MODULE_LICENSES=com.kyvislabs.apexcharts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - ACCEPT_MODULE_CERTS=com.kyvislabs.apexcharts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
    command: >
      -n ignition-dev
      -m 4096
      --
      wrapper.java.initmemory=1024
      -Dignition.allowunsignedmodules=true
      -Dignition.config.mode=develop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - ignition-network

  postgres:
    image: postgres:15-alpine
    container_name: ignition-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ignition
      - POSTGRES_USER=ignition
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./secrets/postgres_password.txt:/run/secrets/postgres_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ignition-network

volumes:
  postgres-data:

networks:
  ignition-network:
    driver: bridge
