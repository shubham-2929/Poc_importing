# Docker Compose for Ignition 8.3 - Multi-Environment GitFlow Setup
# Documentation: https://docs.inductiveautomation.com/docs/8.3/platform/docker-image
---
services:
  # Local Development Environment
  # - Full Ignition data persisted in a Docker named volume
  # - Local gateway state is intentionally NOT version controlled
  ignition-local:
    image: inductiveautomation/ignition:8.3.3
    container_name: ignition-local
    restart: unless-stopped
    ports:
      - "9088:8088"  # HTTP port
      - "9043:8043"  # HTTPS port
      - "9060:8060"  # Gateway Network port
      - "1883:1883"  # Mqtt
    volumes:
      # Persist full Ignition gateway data (commissioning + auth + config + projects)
      - ignition-local-data:/usr/local/bin/ignition/data
      # Keep project resources editable from the repository during local development
      - ./projects:/usr/local/bin/ignition/data/projects
      # Keep gateway config editable from the repository during local development
      - ./config/gateway:/usr/local/bin/ignition/data/config
      # Secrets management
      - ./secrets/gateway_admin_password.txt:/run/secrets/gateway_admin_password:ro
      # Module state configuration (with cert fingerprints for third-party modules)
      - ./config/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./backups/local:/backups
      # Third-party modules (individual file mounts to preserve built-in modules)
      - ./third-party-modules/Embr-Charts-Ignition83-4.0.1.modl:/usr/local/bin/ignition/user-lib/modules/Embr-Charts-Ignition83-4.0.1.modl:ro
      - ./third-party-modules/MQTT-Distributor-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Distributor-signed.modl:ro
      - ./third-party-modules/MQTT-Engine-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Engine-signed.modl:ro
      - ./third-party-modules/MQTT-Transmission-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Transmission-signed.modl:ro
      # Python libraries (domain code only)
      - ./pylib/Mustry:/usr/local/bin/ignition/user-lib/pylib/Mustry:ro
      # JAR libraries
      - ./jar-files/amqp-client-5.28.0.jar:/usr/local/bin/ignition/lib/core/common/amqp-client-5.28.0.jar:ro
    environment:
      - ACCEPT_IGNITION_EULA=Y
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD=${GATEWAY_ADMIN_PASSWORD:-Test123!}
      - IGNITION_EDITION=standard
      - GATEWAY_MODULES_ENABLED=com.inductiveautomation.eventstream, alarm-notification,reporting,opc-ua,perspective,sms-notification,symbol-factory,tag-historian,udp-tcp-drivers,web-developer,com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - IGNITION_UID=1000
      - IGNITION_GID=1000
      - TZ=Europe/Brussels
      - GATEWAY_NETWORK_ENABLED=true
      - GATEWAY_RESTORE_DISABLED=true
      # Auto-accept third-party module licenses and certificates
      - ACCEPT_MODULE_LICENSES=com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - ACCEPT_MODULE_CERTS=com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
    command: >
      -n ignition-local
      -m 4096
      --
      wrapper.java.initmemory=1024
      -Dignition.allowunsignedmodules=true
      -Dignition.config.mode=local-development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ignition-network

  # Development Environment - deploys from 'develop' branch (CI/CD target)
  # - Projects: Receives packaged .zip files from GitHub Actions
  # - Config: Receives config/gateway/ via CI/CD deployment
  # - Do not edit directly - managed by automation
  ignition-dev:
    image: inductiveautomation/ignition:8.3.3
    container_name: ignition-dev
    restart: unless-stopped
    ports:
      - "8088:8088"  # HTTP port
      - "8043:8043"  # HTTPS port
      - "8060:8060"  # Gateway Network port
    volumes:
      # CI/CD deployment targets - managed by automation
      - ./services/ignition-dev/config:/usr/local/bin/ignition/data/config
      - ./services/ignition-dev/projects:/usr/local/bin/ignition/data/projects
      # Persist internal database state to avoid repeated commissioning
      - ./services/ignition-dev/db:/usr/local/bin/ignition/data/db
      # Secrets management
      - ./secrets/gateway_admin_password.txt:/run/secrets/gateway_admin_password:ro
      # Module state configuration (with cert fingerprints for third-party modules)
      - ./config/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./backups/dev:/backups
      # Third-party modules (individual file mounts to preserve built-in modules)
      - ./third-party-modules/Embr-Charts-Ignition83-4.0.1.modl:/usr/local/bin/ignition/user-lib/modules/Embr-Charts-Ignition83-4.0.1.modl:ro
      - ./third-party-modules/MQTT-Distributor-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Distributor-signed.modl:ro
      - ./third-party-modules/MQTT-Engine-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Engine-signed.modl:ro
      - ./third-party-modules/MQTT-Transmission-signed.modl:/usr/local/bin/ignition/user-lib/modules/MQTT-Transmission-signed.modl:ro
      # Python libraries (domain code only)
      - ./pylib/Mustry:/usr/local/bin/ignition/user-lib/pylib/Mustry:ro
      # JAR libraries
      - ./jar-files/amqp-client-5.28.0.jar:/usr/local/bin/ignition/lib/core/common/amqp-client-5.28.0.jar:ro
    environment:
      - ACCEPT_IGNITION_EULA=Y
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD_FILE=/run/secrets/gateway_admin_password
      - IGNITION_EDITION=standard
      - GATEWAY_MODULES_ENABLED=com.inductiveautomation.jdbc.postgresql,alarm-notification,reporting,opc-ua,perspective,sms-notification,symbol-factory,tag-historian,udp-tcp-drivers,web-developer,com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - IGNITION_UID=1000
      - IGNITION_GID=1000
      - TZ=Europe/Brussels
      - GATEWAY_NETWORK_ENABLED=true
      - GATEWAY_RESTORE_DISABLED=true
      # Auto-accept third-party module licenses and certificates
      - ACCEPT_MODULE_LICENSES=com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
      - ACCEPT_MODULE_CERTS=com.mussonindustrial.embr.charts,com.cirruslink.mqtt.distributor.gateway,com.cirruslink.mqtt.engine.gateway,com.cirruslink.mqtt.transmission.gateway
    command: >
      -n ignition-dev
      -m 4096
      --
      wrapper.java.initmemory=1024
      -Dignition.allowunsignedmodules=true
      -Dignition.config.mode=develop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ignition-network

  # Staging Environment - deploys from 'release/*' branches (CI/CD target)
