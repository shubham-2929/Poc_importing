  # PostgreSQL Database for Ignition (shared or per-environment as needed)
  postgres:
    image: postgres:15-alpine
    container_name: ignition-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ignition
      - POSTGRES_USER=ignition
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialization script for creating environment databases
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      # Secrets management
      - ./secrets/postgres_password.txt:/run/secrets/postgres_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ignition-network

networks:
  ignition-network:
    driver: bridge

volumes:
  postgres-data:
  ignition-local-data:
