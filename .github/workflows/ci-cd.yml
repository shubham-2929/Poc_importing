# GitHub Actions CI/CD Pipeline for Ignition 8.3
# GitFlow-based deployment strategy

name: CI/CD Pipeline

on:
  push:
    branches:
      - develop
      - 'release/**'
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
      - 'release/**'
      - main

env:
  BUILD_CONFIGURATION: Release

jobs:
  # Job 1: Build and Validate
  build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects

      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."

          if [ ! -d "projects" ]; then
            echo "No projects directory found, creating placeholder..."
            mkdir -p projects/example-project
            echo '{"version": "1.0.0", "name": "example-project"}' > projects/example-project/project.json
          fi

          chmod +x ./scripts/package-project.sh

          for dir in projects/*/; do
            if [ -d "$dir" ]; then
              echo "Packaging $(basename $dir)..."
              ./scripts/package-project.sh "$dir"
            fi
          done

          ls -lh build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ignition-projects
          path: build/

      - name: Upload Scripts
        uses: actions/upload-artifact@v4
        with:
          name: scripts
          path: scripts/

      - name: Upload Config
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: config/

  # Job 2: Deploy to Development (from develop branch)
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: ${{ secrets.DEV_GATEWAY_URL }}

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Deploy to Development Gateway
        run: |
          set -e

          # Artifacts are downloaded into separate directories
          # Reorganize them
          mv ignition-projects build
          chmod +x ./scripts/*.sh

          # Deploy to dev environment
          echo "Deploying to Development environment..."
          ./scripts/deploy.sh dev
        env:
          DEV_GATEWAY_URL: ${{ secrets.DEV_GATEWAY_URL }}
          DEV_GATEWAY_USER: ${{ secrets.DEV_GATEWAY_USER }}
          DEV_GATEWAY_PASS: ${{ secrets.DEV_GATEWAY_PASS }}

  # Job 3: Deploy to Staging (from release/* branches)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: ${{ secrets.STAGING_GATEWAY_URL }}

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Run Database Migration
        run: |
          set -e

          chmod +x ./scripts/*.sh

          echo "Running database migrations for staging..."
          ./scripts/db-migrate.sh staging up
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}

      - name: Deploy to Staging Gateway
        run: |
          set -e

          # Reorganize artifacts
          mv ignition-projects build
          chmod +x ./scripts/*.sh

          echo "Deploying to Staging environment..."
          ./scripts/deploy.sh staging
        env:
          STAGING_GATEWAY_URL: ${{ secrets.STAGING_GATEWAY_URL }}
          STAGING_GATEWAY_USER: ${{ secrets.STAGING_GATEWAY_USER }}
          STAGING_GATEWAY_PASS: ${{ secrets.STAGING_GATEWAY_PASS }}

  # Job 4: Deploy to Production (from tags on main branch)
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ secrets.PROD_GATEWAY_URL }}

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Backup Production Gateway
        run: |
          set -e

          chmod +x ./scripts/*.sh

          echo "Creating backup of production gateway..."
          ./scripts/backup-gateway.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
          PROD_GATEWAY_USER: ${{ secrets.PROD_GATEWAY_USER }}
          PROD_GATEWAY_PASS: ${{ secrets.PROD_GATEWAY_PASS }}

      - name: Run Database Migration
        run: |
          set -e

          chmod +x ./scripts/*.sh

          echo "Running database migrations for production..."
          ./scripts/db-migrate.sh prod up
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}

      - name: Deploy to Production Gateway
        run: |
          set -e

          # Reorganize artifacts
          mv ignition-projects build
          chmod +x ./scripts/*.sh

          echo "Deploying to Production environment..."
          ./scripts/deploy.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
          PROD_GATEWAY_USER: ${{ secrets.PROD_GATEWAY_USER }}
          PROD_GATEWAY_PASS: ${{ secrets.PROD_GATEWAY_PASS }}

      - name: Run Production Smoke Tests
        run: |
          set -e

          chmod +x ./scripts/*.sh

          echo "Running smoke tests on production..."
          ./scripts/smoke-test.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
