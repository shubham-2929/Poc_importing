# GitHub Actions CI/CD Pipeline for Ignition 8.3
# GitFlow-based deployment strategy

name: CI/CD Pipeline

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
      - release/**
      - main
    tags:
      - v*
  pull_request:
    branches:
      - develop
      - release/**
      - main

env:
  BUILD_CONFIGURATION: Release

jobs:
  check-branch-policy:
    name: Check Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Ensure PR to main is from release branch
        run: |
          if [[ ! "${{ github.head_ref }}" =~ ^release/ ]]; then
            echo "❌ Error: Pull requests to main must come from release/* branches"
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Branch policy check passed: ${{ github.head_ref }} → main"

  build:
    name: Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects

      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."

          # Clean build directory to remove old artifacts
          rm -rf build/
          mkdir -p build/

          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh

            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi

          ls -lh build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted
    needs: [build, test-pylib]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development

    steps:
      - name: Clean Previous Build Artifacts
        run: |
          echo "Cleaning previous build artifacts..."
          rm -rf build/
          mkdir -p build/

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: .

      - name: Initialize Database
        run: |
          set -e
          echo "Ensuring development database exists..."
          docker exec ignition-postgres psql -U ignition -d postgres -c "CREATE DATABASE ignition_dev;" 2>/dev/null || echo "Database ignition_dev already exists"

      - name: Deploy to Development Gateway
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Deploying to Development environment..."
          ./scripts/deploy.sh dev
        env:
          DEV_GATEWAY_URL: ${{ secrets.DEV_GATEWAY_URL }}
          DEV_GATEWAY_USER: ${{ secrets.DEV_GATEWAY_USER }}
          DEV_GATEWAY_PASS: ${{ secrets.DEV_GATEWAY_PASS }}
          DEV_GATEWAY_API_KEY: ${{ secrets.DEV_GATEWAY_API_KEY }}
          DEV_DB_URL: ${{ secrets.DEV_DB_URL }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: [build, test-pylib]
    if: startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging

    steps:
      - name: Clean Previous Build Artifacts
        run: |
          echo "Cleaning previous build artifacts..."
          rm -rf build/
          mkdir -p build/

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: .

      - name: Initialize Database
        run: |
          set -e
          echo "Ensuring staging database exists..."
          docker exec ignition-postgres psql -U ignition -d postgres -c "CREATE DATABASE ignition_staging;" 2>/dev/null || echo "Database ignition_staging already exists"

      - name: Run Database Migration
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Running database migrations for staging..."
          ./scripts/db-migrate.sh staging up
        env:
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}

      - name: Deploy to Staging Gateway
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Deploying to Staging environment..."
          ./scripts/deploy.sh staging
        env:
          STAGING_GATEWAY_URL: ${{ secrets.STAGING_GATEWAY_URL }}
          STAGING_GATEWAY_USER: ${{ secrets.STAGING_GATEWAY_USER }}
          STAGING_GATEWAY_PASS: ${{ secrets.STAGING_GATEWAY_PASS }}
          STAGING_GATEWAY_API_KEY: ${{ secrets.STAGING_GATEWAY_API_KEY }}
          STAGING_DB_URL: ${{ secrets.STAGING_DB_URL }}

  deploy-prod:
    name: Deploy to Production
    runs-on: self-hosted
    needs: [build, test-pylib]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production

    steps:
      - name: Clean Previous Build Artifacts
        run: |
          echo "Cleaning previous build artifacts..."
          rm -rf build/
          mkdir -p build/

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: .

      - name: Backup Production Gateway
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Creating backup of production gateway..."
          ./scripts/backup-gateway.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
          PROD_GATEWAY_USER: ${{ secrets.PROD_GATEWAY_USER }}
          PROD_GATEWAY_PASS: ${{ secrets.PROD_GATEWAY_PASS }}
          PROD_GATEWAY_API_KEY: ${{ secrets.PROD_GATEWAY_API_KEY }}

      - name: Initialize Database
        run: |
          set -e
          echo "Ensuring production database exists..."
          docker exec ignition-postgres psql -U ignition -d postgres -c "CREATE DATABASE ignition_prod;" 2>/dev/null || echo "Database ignition_prod already exists"

      - name: Run Database Migration
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Running database migrations for production..."
          ./scripts/db-migrate.sh prod up
        env:
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}

      - name: Deploy to Production Gateway
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Deploying to Production environment..."
          ./scripts/deploy.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
          PROD_GATEWAY_API_KEY: ${{ secrets.PROD_GATEWAY_API_KEY }}
          PROD_GATEWAY_USER: ${{ secrets.PROD_GATEWAY_USER }}
          PROD_GATEWAY_PASS: ${{ secrets.PROD_GATEWAY_PASS }}
          PROD_DB_URL: ${{ secrets.PROD_DB_URL }}

      - name: Run Production Smoke Tests
        run: |
          set -e
          chmod +x ./scripts/*.sh
          echo "Running smoke tests on production..."
          ./scripts/smoke-test.sh prod
        env:
          PROD_GATEWAY_URL: ${{ secrets.PROD_GATEWAY_URL }}
