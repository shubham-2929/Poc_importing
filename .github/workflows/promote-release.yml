# GitHub Actions Release Promotion Pipeline
# This workflow promotes a release from staging to production
# Trigger: Manual only (workflow_dispatch)

name: Promote Release

permissions:
  contents: write

concurrency:
  group: promote-release-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      releaseBranch:
        description: 'Release Branch (e.g., release/1.0.0)'
        required: true
        default: 'release/1.0.0'
      releaseTag:
        description: 'Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      mergeToMain:
        description: 'Merge to main after successful deployment'
        required: true
        type: boolean
        default: true

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Branch Exists
        run: |
          set -e

          BRANCH="${{ github.event.inputs.releaseBranch }}"
          TAG="${{ github.event.inputs.releaseTag }}"

          echo "Validating release branch: $BRANCH"

          if ! git rev-parse --verify "origin/$BRANCH" > /dev/null 2>&1; then
            echo "Error: Branch $BRANCH does not exist"
            exit 1
          fi

          echo "✓ Branch $BRANCH exists"
          echo "Will create tag: $TAG"

  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Create and Push Tag
        run: |
          set -e

          BRANCH="${{ github.event.inputs.releaseBranch }}"
          TAG="${{ github.event.inputs.releaseTag }}"

          echo "Creating tag $TAG on branch $BRANCH"
          git checkout "$BRANCH"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "✓ Tag $TAG created and pushed"

  merge-to-main:
    name: Merge to Main
    runs-on: ubuntu-latest
    needs: create-tag
    if: github.event.inputs.mergeToMain == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Merge to Main
        run: |
          set -e

          BRANCH="${{ github.event.inputs.releaseBranch }}"

          echo "Merging $BRANCH to main"
          git checkout main
          git merge "$BRANCH" --no-ff -m "Merge $BRANCH into main"
          git push origin main

          echo "✓ Release merged to main"
